version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Ticketer@Admin123!
      - POSTGRES_DB=TicketerDb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TicketerDb"]
      interval: 10s
      timeout: 3s
      retries: 10
      
  api:
    build:
      context: .
      dockerfile: Ticketer.Presentation/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Override the default connection string to point to the postgres container
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=TicketerDb;Username=postgres;Password=Ticketer@Admin123!;
    depends_on:
      postgres:
        condition: service_healthy